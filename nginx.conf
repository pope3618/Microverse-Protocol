# microvse-clone — nginx 反代配置（复刻 microvse.com 部署方式）
# 用法：放到 /etc/nginx/sites-available/ 并软链到 sites-enabled，再 nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name www.microvse.com microvse.com;
    # 证书申请阶段先用 80 端口（certbot 会自动改写 443）
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name www.microvse.com microvse.com;

    ssl_certificate     /etc/letsencrypt/live/www.microvse.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.microvse.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # 静态资源长缓存（_next chunk 带 hash，可 immutable）
    location /_next/static/ {
        alias /var/www/microvse/.next/standalone/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 站点图标等 public 资源
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # HTML 不缓存，保证内容新鲜（与线上 Cache-Control: no-cache 一致）
        proxy_set_header Cache-Control "no-cache";
    }
}
